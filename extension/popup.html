<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude MCP Dashboard</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <div class="header-left">
      <canvas id="logo-canvas" width="28" height="28"></canvas>
      <span class="header-title">MCP Dashboard</span>
    </div>
    <div id="session-badge" class="session-badge"></div>
  </header>

  <section id="active-section">
    <div class="section-label">ACTIVE NOW</div>
    <div id="active-tabs-list"></div>
  </section>

  <nav>
    <button id="log-tab" class="nav-tab active">Log</button>
    <button id="screenshots-tab" class="nav-tab">Screenshots</button>
  </nav>

  <div id="filter-bar">
    <div id="session-dropdown" class="custom-dropdown">
      <button id="session-trigger" class="dropdown-trigger">
        <span id="session-trigger-text">All sessions</span>
        <svg width="10" height="6" viewBox="0 0 10 6" fill="none">
          <path d="M1 1l4 4 4-4" stroke="#5a5550" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div id="session-menu" class="dropdown-menu" hidden></div>
    </div>
    <button id="clear-btn">Clear</button>
  </div>

  <div id="log-view">
    <div id="event-list"></div>
  </div>

  <div id="screenshots-view" hidden>
    <div id="screenshot-grid"></div>
  </div>

  <div id="modal" hidden>
    <div class="modal-overlay"></div>
    <img id="modal-img" src="" alt="Screenshot" />
  </div>

  <script src="popup.js"></script>
</body>
</html>
